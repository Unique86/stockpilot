<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPilot</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="container">

    <h1>📈 StockPilot</h1>

    <div class="card">

    <h2>📈 Stock Chart</h2>

    <canvas id="stock-chart"></canvas>

   </div>

   <div class="card">
  
    <div class="watchlist-header">
   
        <h2>⭐ My Watchlist</h2>
   
    <button id="refresh-watchlist">
    🔄 Refresh All
    </button>
   </div>

    <div id="watchlist">
        <p>No stocks added yet.</p>
    </div>
  </div>

   <div class="card">
       <h2>📈 Search Stock</h2>

    <p>Enter a stock ticker symbol.</p>

    <input
        type="text"
        placeholder="AAPL, TSLA, MSFT..."
        id="ticker"
    >

    <button id="searchButton">Search</button>
</div>
<div id="stockResult" class="stock-result">
    <p>Search for a stock to see its information.</p>
</div>

    <div class="card">
        <h2>📰 Market News</h2>
        <p>Latest financial news will appear here.</p>
    </div>

</div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/app.js"></script>

</body>
</html>
